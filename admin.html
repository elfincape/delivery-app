<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>저온물류 관리자</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

<!-- 로그인 화면 -->
<div id="login-box" class="login-container">
    <h2>🔐 관리자 로그인</h2>
    <input type="password" id="admin-pw" placeholder="비밀번호">
    <button onclick="checkPassword()">로그인</button>
    <p id="pw-error" style="color: var(--danger); display: none; margin-top: 10px; font-size: 14px;">비밀번호가 틀렸습니다.</p>
</div>

<!-- 관리자 대시보드 -->
<div id="dashboard" class="admin-container" style="display: none;">
    <h1>🚛 저온물류 관리자 대시보드</h1>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('list')">📋 운행 목록</button>
        <button class="tab" onclick="switchTab('live')">🗺️ 실시간 추적</button>
    </div>

    <!-- 탭 1: 운행 목록 -->
    <div id="tab-list">
        <div class="filter-bar">
            <input type="date" id="filter-date">
            <input type="text" id="filter-vehicle" placeholder="차량번호 검색">
            <select id="filter-status">
                <option value="">전체 상태</option>
                <option value="ongoing">운행중</option>
                <option value="completed">완료</option>
            </select>
            <button onclick="loadTrips()">조회</button>
        </div>
        <table id="trip-table">
            <thead>
                <tr>
                    <th>날짜</th><th>차량</th><th>기사</th><th>회전</th>
                    <th>시작</th><th>종료</th><th>상태</th><th>사진</th>
                </tr>
            </thead>
            <tbody id="trip-body"></tbody>
        </table>
    </div>

    <!-- 탭 2: 실시간 추적 -->
    <div id="tab-live" style="display: none;">
        <div class="live-header">
            <h2 style="margin: 0;">🗺️ 실시간 차량 위치</h2>
            <span class="live-badge">운행 중: <span id="live-count">0</span>대</span>
            <span class="live-pulse">LIVE (5초 갱신)</span>
        </div>
        <div id="live-map"></div>
        <p style="color: var(--text-muted); font-size: 13px; margin-top: 10px;">🔵 정상 (5분 내) | 🔴 지연 (5분 이상)</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
